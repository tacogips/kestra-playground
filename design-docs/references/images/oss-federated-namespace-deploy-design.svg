<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Kestra OSS federated namespace and deploy design</title>
  <desc id="desc">Diagram showing canonical Kestra flow resources rendered into two GCE server-specific namespaces, local colocated deployment, production GCE A and GCE B deployment, and GKE controller request flow.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#db2777"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #374151; }
      .box-title { font-size: 17px; font-weight: 700; }
      .box-body { font-size: 13px; }
      .caption { font-size: 13px; font-weight: 700; fill: #374151; }
      .small { font-size: 12px; fill: #374151; }
      .lane-title { font-size: 18px; font-weight: 700; fill: #111827; }
    </style>
  </defs>

  <rect width="1280" height="980" fill="#ffffff"/>

  <text x="640" y="42" text-anchor="middle" class="title">Kestra OSS federated namespace and deploy design</text>
  <text x="640" y="72" text-anchor="middle" class="subtitle">The same canonical Kestra resources are rendered into server namespaces; deployment changes only target URLs and credentials.</text>

  <g id="source">
    <rect x="390" y="105" width="500" height="150" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="640" y="132" text-anchor="middle" class="box-title">Canonical Kestra resources</text>
    <text x="640" y="160" text-anchor="middle" class="box-body">kestra/flows/*.yaml</text>
    <text x="640" y="181" text-anchor="middle" class="box-body">base namespace: playground.ecommerce</text>
    <text x="640" y="212" text-anchor="middle" class="box-body">kestra/flows-federated/*.yaml</text>
    <text x="640" y="233" text-anchor="middle" class="box-body">controller namespace: playground.ecommerce.controller</text>
  </g>

  <g id="renderer">
    <rect x="390" y="305" width="500" height="130" rx="10" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
    <text x="640" y="332" text-anchor="middle" class="box-title">Deploy-time namespace renderer</text>
    <text x="640" y="361" text-anchor="middle" class="box-body">scripts/render-federated-child-flows.sh</text>
    <text x="640" y="385" text-anchor="middle" class="box-body">validates base namespace</text>
    <text x="640" y="409" text-anchor="middle" class="box-body">outputs server-specific child flow YAML</text>
  </g>

  <g id="gce-a-namespace">
    <rect x="80" y="505" width="330" height="145" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="245" y="532" text-anchor="middle" class="box-title">GCE worker A namespace</text>
    <text x="245" y="560" text-anchor="middle" class="box-body">playground.ecommerce.server_gce_a</text>
    <text x="245" y="590" text-anchor="middle" class="box-body">generate_ecommerce_mock_data</text>
    <text x="245" y="614" text-anchor="middle" class="box-body">build_ecommerce_customer_segments</text>
  </g>

  <g id="controller-namespace">
    <rect x="470" y="505" width="340" height="145" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="640" y="532" text-anchor="middle" class="box-title">Controller namespace</text>
    <text x="640" y="560" text-anchor="middle" class="box-body">playground.ecommerce.controller</text>
    <text x="640" y="590" text-anchor="middle" class="box-body">run_federated_ecommerce_batch</text>
    <text x="640" y="614" text-anchor="middle" class="box-body">calls child Kestra REST APIs</text>
  </g>

  <g id="gce-b-namespace">
    <rect x="870" y="505" width="330" height="145" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1035" y="532" text-anchor="middle" class="box-title">GCE worker B namespace</text>
    <text x="1035" y="560" text-anchor="middle" class="box-body">playground.ecommerce.server_gce_b</text>
    <text x="1035" y="590" text-anchor="middle" class="box-body">generate_ecommerce_mock_data</text>
    <text x="1035" y="614" text-anchor="middle" class="box-body">build_ecommerce_daily_report</text>
  </g>

  <line x1="640" y1="255" x2="640" y2="300" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="660" y="283" class="caption">render</text>
  <path d="M550 435 C470 470,370 482,252 500" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="380" y="468" class="caption">server_gce_a</text>
  <line x1="640" y1="435" x2="640" y2="500" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="660" y="472" class="caption">controller</text>
  <path d="M730 435 C810 470,910 482,1028 500" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="865" y="468" class="caption">server_gce_b</text>

  <text x="330" y="710" text-anchor="middle" class="lane-title">Local / staging contract test</text>
  <g id="local">
    <rect x="70" y="735" width="520" height="165" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="330" y="765" text-anchor="middle" class="box-title">One physical Kestra endpoint</text>
    <text x="330" y="795" text-anchor="middle" class="box-body">Register server_gce_a, server_gce_b, and controller into localhost</text>
    <text x="330" y="822" text-anchor="middle" class="box-body">Same controller flow and same child REST API contract</text>
    <text x="330" y="852" text-anchor="middle" class="box-body">task kestra:flows:run-federated-local</text>
    <text x="330" y="878" text-anchor="middle" class="small">Physical placement is collapsed; namespace and request shape are preserved.</text>
  </g>

  <text x="950" y="710" text-anchor="middle" class="lane-title">Production-like live deploy</text>
  <g id="production">
    <rect x="690" y="735" width="520" height="165" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="950" y="765" text-anchor="middle" class="box-title">Separate GCE child execution targets</text>
    <text x="950" y="795" text-anchor="middle" class="box-body">gce-compose receives server_gce_a namespace</text>
    <text x="950" y="822" text-anchor="middle" class="box-body">gce-container receives server_gce_b namespace</text>
    <text x="950" y="852" text-anchor="middle" class="box-body">task kestra:live:run-federated</text>
    <text x="950" y="878" text-anchor="middle" class="small">GKE receives only the controller namespace.</text>
  </g>

  <path d="M245 650 C240 690,250 710,320 735" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M640 650 C620 690,520 710,410 735" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1035 650 C1040 690,1010 710,970 735" fill="none" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <path d="M640 650 C720 700,825 708,910 735" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <path d="M245 650 C410 700,735 705,888 735" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <g id="request-flow">
    <rect x="95" y="925" width="1090" height="40" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="640" y="950" text-anchor="middle" class="box-body">Request flow: controller POSTs child executions by URL + namespace, polls child execution state, and records child execution IDs in controller output.</text>
  </g>

  <g id="guardrail">
    <rect x="930" y="110" width="270" height="180" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="1065" y="138" text-anchor="middle" class="box-title">Guardrail</text>
    <text x="1065" y="170" text-anchor="middle" class="box-body">No shared OSS worker queue</text>
    <text x="1065" y="195" text-anchor="middle" class="box-body">is used for placement.</text>
    <text x="1065" y="230" text-anchor="middle" class="box-body">Routing happens before</text>
    <text x="1065" y="255" text-anchor="middle" class="box-body">execution by URL + namespace.</text>
  </g>

  <line x1="890" y1="200" x2="925" y2="200" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow-pink)"/>
</svg>
