<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">OSS DB-backed worker group emulation mechanism</title>
  <desc id="desc">A diagram showing Kestra enqueueing a job row, an external agent claiming matching target groups, local execution, progress updates, and Kestra waiting for the result.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #374151; }
      .box-title { font-size: 18px; font-weight: 700; }
      .box-body { font-size: 14px; }
      .caption { font-size: 13px; font-weight: 700; fill: #374151; }
      .small { font-size: 13px; }
    </style>
  </defs>

  <rect width="1280" height="900" fill="#ffffff"/>

  <text x="640" y="48" text-anchor="middle" class="title">Mechanism: OSS workgroup emulation by DB claim contract</text>
  <text x="640" y="78" text-anchor="middle" class="subtitle">Routing happens before execution by matching job rows, not by Kestra native Worker Groups.</text>

  <g id="kestra-flow">
    <rect x="40" y="130" width="260" height="175" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="170" y="162" text-anchor="middle" class="box-title">Kestra flow task</text>
    <text x="170" y="195" text-anchor="middle" class="box-body">Runs on ordinary GKE worker</text>
    <text x="170" y="225" text-anchor="middle" class="box-body">INSERT / UPSERT job row</text>
    <text x="170" y="250" text-anchor="middle" class="box-body">job_id = execution.id</text>
    <text x="170" y="275" text-anchor="middle" class="box-body">target_group = gce-heavy</text>
  </g>

  <g id="job-row">
    <rect x="390" y="115" width="310" height="210" rx="14" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/>
    <text x="545" y="148" text-anchor="middle" class="box-title">Job row contract</text>
    <text x="545" y="180" text-anchor="middle" class="box-body">status: PENDING to RUNNING</text>
    <text x="545" y="205" text-anchor="middle" class="box-body">then SUCCESS / FAILED</text>
    <text x="545" y="235" text-anchor="middle" class="box-body">target_group, target_worker</text>
    <text x="545" y="260" text-anchor="middle" class="box-body">progress_percent, heartbeat_at</text>
    <text x="545" y="285" text-anchor="middle" class="box-body">result jsonb</text>
  </g>

  <g id="claim-sql">
    <rect x="785" y="115" width="430" height="210" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
    <text x="1000" y="148" text-anchor="middle" class="box-title">Atomic claim SQL</text>
    <text x="1000" y="180" text-anchor="middle" class="box-body">WHERE status = PENDING</text>
    <text x="1000" y="205" text-anchor="middle" class="box-body">AND target_group = :agent_group</text>
    <text x="1000" y="230" text-anchor="middle" class="box-body">AND target_worker IS NULL OR :agent_name</text>
    <text x="1000" y="260" text-anchor="middle" class="box-body">FOR UPDATE SKIP LOCKED</text>
    <text x="1000" y="285" text-anchor="middle" class="box-body">LIMIT 1</text>
  </g>

  <g id="agent">
    <rect x="785" y="400" width="430" height="170" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="1000" y="432" text-anchor="middle" class="box-title">Agent process</text>
    <text x="1000" y="465" text-anchor="middle" class="box-body">One per physical worker</text>
    <text x="1000" y="495" text-anchor="middle" class="box-body">GCE_WORKER_GROUP=gce-heavy</text>
    <text x="1000" y="520" text-anchor="middle" class="box-body">GCE_WORKER_NAME=host-a</text>
    <text x="1000" y="545" text-anchor="middle" class="box-body">Polls DB only</text>
  </g>

  <g id="local-execution">
    <rect x="785" y="640" width="430" height="170" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="1000" y="672" text-anchor="middle" class="box-title">Local execution</text>
    <text x="1000" y="705" text-anchor="middle" class="box-body">Runs host-local script / SQL / GPU batch</text>
    <text x="1000" y="735" text-anchor="middle" class="box-body">No task is pulled from Kestra queue</text>
    <text x="1000" y="765" text-anchor="middle" class="box-body">No GCP inbound access to worker</text>
  </g>

  <g id="progress">
    <rect x="390" y="640" width="310" height="170" rx="14" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
    <text x="545" y="672" text-anchor="middle" class="box-title">Progress reporting</text>
    <text x="545" y="705" text-anchor="middle" class="box-body">UPDATE job row</text>
    <text x="545" y="730" text-anchor="middle" class="box-body">progress_percent, message</text>
    <text x="545" y="755" text-anchor="middle" class="box-body">heartbeat_at</text>
    <text x="545" y="780" text-anchor="middle" class="box-body">error_message / result</text>
  </g>

  <g id="kestra-wait">
    <rect x="40" y="640" width="260" height="170" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="170" y="672" text-anchor="middle" class="box-title">Kestra wait task</text>
    <text x="170" y="705" text-anchor="middle" class="box-body">Loops until terminal state</text>
    <text x="170" y="735" text-anchor="middle" class="box-body">Fetches job row and output</text>
    <text x="170" y="765" text-anchor="middle" class="box-body">Execution history stays central</text>
  </g>

  <g id="rerun">
    <rect x="40" y="400" width="260" height="170" rx="14" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="170" y="432" text-anchor="middle" class="box-title">Rerun behavior</text>
    <text x="170" y="465" text-anchor="middle" class="box-body">UPSERT resets status=PENDING</text>
    <text x="170" y="495" text-anchor="middle" class="box-body">Clears claim/progress/result</text>
    <text x="170" y="525" text-anchor="middle" class="box-body">Agent claims again</text>
  </g>

  <line x1="300" y1="220" x2="385" y2="220" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="342" y="204" text-anchor="middle" class="caption">1 enqueue</text>
  <line x1="700" y1="220" x2="780" y2="220" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="740" y="204" text-anchor="middle" class="caption">2 filter</text>
  <line x1="1000" y1="400" x2="1000" y2="330" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="1060" y="365" class="caption">3 poll</text>
  <line x1="1000" y1="570" x2="1000" y2="635" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="1065" y="606" class="caption">4 run locally</text>
  <line x1="785" y1="725" x2="705" y2="725" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="745" y="710" text-anchor="middle" class="caption">5 update</text>
  <path d="M545 640 C545 520,545 430,545 330" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="570" y="500" class="caption">row is source of truth</text>
  <line x1="390" y1="725" x2="305" y2="725" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="348" y="710" text-anchor="middle" class="caption">6 wait/read</text>
  <path d="M170 400 C170 350,170 340,170 310" fill="none" stroke="#db2777" stroke-width="2.5" marker-end="url(#arrow-purple)"/>

  <text x="640" y="865" text-anchor="middle" class="subtitle">Key point: this emulates placement for selected external jobs, but it does not make Kestra OSS route arbitrary native task types by worker group.</text>
</svg>
