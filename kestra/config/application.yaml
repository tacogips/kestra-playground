datasources:
  postgres:
    url: ${KESTRA_DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${KESTRA_DB_USERNAME}
    password: ${KESTRA_DB_PASSWORD}
    maximum-pool-size: ${KESTRA_DB_MAX_POOL_SIZE:10}

kestra:
  server:
    basic-auth:
      username: ${KESTRA_BASIC_AUTH_USERNAME:admin@example.com}
      password: ${KESTRA_BASIC_AUTH_PASSWORD:KestraDev1234!}
  repository:
    type: postgres
  queue:
    type: postgres
  storage:
    type: ${KESTRA_STORAGE_TYPE:local}
    local:
      base-path: ${KESTRA_LOCAL_STORAGE_PATH:/app/storage}
    gcs:
      bucket: ${KESTRA_GCS_BUCKET:}
  tasks:
    tmp-dir:
      path: /tmp/kestra-wd/tmp
  url: ${KESTRA_URL:http://localhost:8080/}
  variables:
    env-vars-prefix: "ENV_"
