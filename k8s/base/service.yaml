apiVersion: v1
kind: Service
metadata:
  name: kestra-webserver
  namespace: kestra
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: kestra
    app.kubernetes.io/component: webserver
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
