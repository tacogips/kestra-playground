apiVersion: v1
kind: ConfigMap
metadata:
  name: kestra-runtime-config
  namespace: kestra
data:
  CLOUD_SQL_INSTANCE: "replace-with-cloud-sql-connection-name"
  application.yaml: |
    micronaut:
      otel:
        enabled: ${OTEL_ENABLED:true}
    otel:
      traces:
        exporter: ${OTEL_TRACES_EXPORTER:otlp}
      metrics:
        exporter: ${OTEL_METRICS_EXPORTER:otlp}
      logs:
        exporter: ${OTEL_LOGS_EXPORTER:otlp}
      exporter:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    datasources:
      postgres:
        url: ${KESTRA_DB_URL}
        driver-class-name: org.postgresql.Driver
        username: ${KESTRA_DB_USERNAME}
        password: ${KESTRA_DB_PASSWORD}
        maximum-pool-size: ${KESTRA_DB_MAX_POOL_SIZE:2}
    kestra:
      server:
        basic-auth:
          username: ${KESTRA_SERVER_BASIC__AUTH_USERNAME}
          password: ${KESTRA_SERVER_BASIC__AUTH_PASSWORD}
      repository:
        type: postgres
      queue:
        type: postgres
      storage:
        type: gcs
        gcs:
          bucket: ${KESTRA_GCS_BUCKET}
      tasks:
        tmp-dir:
          path: /tmp/kestra-wd/tmp
      worker:
        routing:
          groups:
            controller:
              queues:
                - workerQueueId: default
                  reservedPercent: -1
                - workerQueueId: system
                  reservedPercent: -1
            gce-a:
              queues:
                - workerQueueId: gce-a
                  reservedPercent: -1
            gce-b:
              queues:
                - workerQueueId: gce-b
                  reservedPercent: -1
            gke-small:
              queues:
                - workerQueueId: gke-small
                  reservedPercent: -1
            gke-large:
              queues:
                - workerQueueId: gke-large
                  reservedPercent: -1
          queues:
            gce-a:
              tags: [gce-a]
            gce-b:
              tags: [gce-b]
            gke-small:
              tags: [gke-small]
            gke-large:
              tags: [gke-large]
      traces:
        root: ${KESTRA_TRACES_ROOT:DEFAULT}
      url: http://kestra-webserver:8080/
      variables:
        env-vars-prefix: "ENV_"
