apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestra-indexer
  namespace: kestra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kestra
      app.kubernetes.io/component: indexer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kestra
        app.kubernetes.io/component: indexer
    spec:
      serviceAccountName: kestra
      containers:
        - name: kestra
          image: kestra/kestra:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-ec"]
          args:
            - |
              until (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; do
                sleep 1
              done
              exec /app/kestra server indexer --config /etc/kestra/application.yaml
          envFrom:
            - secretRef:
                name: kestra-secrets
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: kestra-indexer
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=kestra-playground,deployment.environment=dev,k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),kestra.component=indexer
          volumeMounts:
            - name: config
              mountPath: /etc/kestra
            - name: tmp
              mountPath: /tmp/kestra-wd
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args: ["--structured-logs", "--port=5432", "$(CLOUD_SQL_INSTANCE)"]
          env:
            - name: CLOUD_SQL_INSTANCE
              valueFrom:
                configMapKeyRef:
                  name: kestra-config
                  key: CLOUD_SQL_INSTANCE
      volumes:
        - name: config
          configMap:
            name: kestra-config
            items:
              - key: application.yaml
                path: application.yaml
        - name: tmp
          emptyDir: {}
