apiVersion: v1
kind: Secret
metadata:
  name: kestra-secrets
  namespace: kestra
type: Opaque
stringData:
  KESTRA_DB_URL: jdbc:postgresql://127.0.0.1:5432/kestra
  KESTRA_DB_USERNAME: kestra
  KESTRA_DB_PASSWORD: replace-me
  KESTRA_GCS_BUCKET: replace-me
  KESTRA_BASIC_AUTH_USERNAME: admin@example.com
  KESTRA_BASIC_AUTH_PASSWORD: replace-me
  KESTRA_SERVER_BASIC__AUTH_USERNAME: admin@example.com
  KESTRA_SERVER_BASIC__AUTH_PASSWORD: replace-me
  ENV_BATCH_DB_URL: jdbc:postgresql://127.0.0.1:5432/ecommerce_ops
  ENV_BATCH_DB_USERNAME: kestra
  ENV_BATCH_DB_PASSWORD: replace-me
  ENV_FEDERATED_GCE_A_URL: http://gce-a.example.local
  ENV_FEDERATED_GCE_A_USERNAME: admin@example.com
  ENV_FEDERATED_GCE_A_PASSWORD: replace-me
  ENV_FEDERATED_GCE_B_URL: http://gce-b.example.local
  ENV_FEDERATED_GCE_B_USERNAME: admin@example.com
  ENV_FEDERATED_GCE_B_PASSWORD: replace-me
