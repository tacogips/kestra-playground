apiVersion: v1
kind: Secret
metadata:
  name: kestra-secrets
  namespace: kestra
type: Opaque
stringData:
  KESTRA_DB_URL: jdbc:postgresql://127.0.0.1:5432/kestra
  KESTRA_DB_USERNAME: kestra
